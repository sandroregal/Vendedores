<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E4C89">
<title>Copiloto Comercial SP · Royal FIC</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
 --azul:#0E4C89;--azul-esc:#0A3A6A;--azul-tinta:#093056;
 --laranja:#F89D1B;--laranja-esc:#D9810F;
 --tinta:#10202F;--cinza:#5B6B7A;--cinza-cl:#8A97A3;
 --linha:#E4EAF0;--fundo:#EEF2F6;--papel:#fff;--box:#F6F9FC;
 --conq:#F89D1B;--equi:#E0B23C;--atend:#2E8B6A;
 --verde:#1E8A5A;--verm:#C2453B;
 --sb: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
 background:var(--fundo);color:var(--tinta);line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased;
 padding-bottom:calc(64px + var(--sb));}
.app{max-width:760px;margin:0 auto;background:var(--fundo);min-height:100%;}

/* HEADER */
header{background:linear-gradient(135deg,var(--azul),var(--azul-tinta));color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(9,48,86,.25);}
.hrow{display:flex;align-items:center;gap:12px;}
.seal{background:#fff;border-radius:9px;padding:6px 9px;display:flex;flex:0 0 auto;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.seal img{height:22px;display:block;}
.htxt{flex:1;min-width:0;}
.htxt .ttl{font-weight:700;font-size:15.5px;letter-spacing:.01em;}
.htxt .sub{font-size:11px;color:#BBD2EA;letter-spacing:.03em;}
.refresh{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:9px;width:36px;height:36px;font-size:17px;cursor:pointer;flex:0 0 auto;transition:.15s;}
.refresh:active{transform:scale(.92);}

/* role + vendedor */
.controls{display:flex;gap:8px;margin-top:12px;align-items:center;}
.seg{display:flex;background:rgba(0,0,0,.18);border-radius:9px;padding:3px;flex:0 0 auto;}
.seg button{border:none;background:none;color:#cfe0f0;font-weight:600;font-size:13px;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s;}
.seg button.on{background:var(--laranja);color:#2a1900;}
.vendsel{flex:1;min-width:0;}
.vendsel select{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:13.5px;font-weight:600;padding:8px 10px;border-radius:9px;appearance:none;cursor:pointer;}
.vendsel select option{color:#10202F;}
.vendsel.hide{display:none;}

/* TABS */
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;border-top:1px solid var(--linha);
 display:flex;max-width:760px;margin:0 auto;padding-bottom:var(--sb);box-shadow:0 -2px 14px rgba(9,48,86,.08);}
nav button{flex:1;border:none;background:none;padding:9px 2px 7px;cursor:pointer;color:var(--cinza-cl);font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;}
nav button .ic{font-size:18px;line-height:1;}
nav button.on{color:var(--azul);}
nav button.on .ic{filter:none;}
nav button .fz{font-size:8px;letter-spacing:.04em;color:var(--laranja-esc);font-weight:700;}

/* CONTENT */
main{padding:16px 14px 28px;}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:var(--papel);border:1px solid var(--linha);border-radius:13px;padding:13px 14px;box-shadow:0 1px 6px rgba(9,48,86,.04);}
.kpi .lab{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--cinza);font-weight:700;margin-bottom:5px;}
.kpi .val{font-size:24px;font-weight:800;color:var(--azul);line-height:1;letter-spacing:-.01em;}
.kpi .val small{font-size:13px;font-weight:700;color:var(--cinza);}
.kpi .note{font-size:11px;color:var(--cinza-cl);margin-top:5px;}
.kpi.hi{background:linear-gradient(140deg,#FFF6E9,#FFFDF8);border-color:#F6D9A8;}
.kpi.hi .val{color:var(--laranja-esc);}

.secttl{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--azul);font-weight:800;margin:18px 2px 10px;display:flex;align-items:center;gap:8px;}
.secttl::before{content:"";width:4px;height:14px;background:var(--laranja);border-radius:2px;}

/* MAP */
.mapwrap{background:var(--papel);border:1px solid var(--linha);border-radius:14px;padding:10px 8px 8px;margin-bottom:8px;box-shadow:0 1px 6px rgba(9,48,86,.04);}
.mapwrap svg{width:100%;height:auto;display:block;}
.mapwrap path{stroke:#fff;stroke-width:.8;cursor:pointer;transition:opacity .15s,stroke-width .15s;}
.mapwrap path:hover{opacity:.82;}
.mapwrap path.sel{stroke:#10202F;stroke-width:2;}
.leg{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:4px 0 2px;font-size:11px;color:var(--cinza);}
.leg span{display:inline-flex;align-items:center;gap:5px;}
.leg i{width:11px;height:11px;border-radius:3px;display:inline-block;}

/* drill panel */
.drill{background:linear-gradient(135deg,var(--azul),var(--azul-esc));color:#fff;border-radius:14px;padding:16px;margin-bottom:14px;animation:fade .2s;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.drill h3{font-size:17px;font-weight:800;margin-bottom:2px;}
.drill .meta{font-size:12px;color:#BBD2EA;margin-bottom:12px;}
.drill .dg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.drill .dcell{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:9px 11px;}
.drill .dcell .l{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#9FC0E0;font-weight:700;}
.drill .dcell .v{font-size:18px;font-weight:800;margin-top:2px;}
.drill .dcell .v.pos{color:#7FE3B0;} .drill .dcell .v.neg{color:#FFB6AD;}
.drill .cons{margin-top:12px;font-size:12.5px;color:#DDEAF6;}
.drill .cons b{color:var(--laranja);}

/* RANK LIST */
.row{background:var(--papel);border:1px solid var(--linha);border-radius:12px;padding:11px 13px;margin-bottom:9px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 1px 4px rgba(9,48,86,.03);transition:.12s;}
.row:active{transform:scale(.99);}
.row .bar{flex:0 0 4px;align-self:stretch;border-radius:3px;}
.row .mn{flex:1;min-width:0;}
.row .mn .nm{font-weight:700;font-size:14px;color:var(--tinta);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row .mn .ms{font-size:11.5px;color:var(--cinza);margin-top:2px;}
.row .rt{flex:0 0 auto;text-align:right;}
.row .rt .big{font-size:18px;font-weight:800;color:var(--azul);line-height:1;}
.row .rt .sm{font-size:10px;color:var(--cinza-cl);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-top:3px;}
.chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;display:inline-block;letter-spacing:.02em;}
.chip.conquistar{background:#FDEEDB;color:var(--laranja-esc);}
.chip.equilibrio{background:#FBF3DC;color:#9A7715;}
.chip.atendido{background:#E1F3EA;color:var(--atend);}
.opp{font-size:11px;font-weight:700;}
.opp.pos{color:var(--laranja-esc);} .opp.neg{color:var(--verde);}

/* vendedor head */
.vhead{background:linear-gradient(135deg,#FFF6E9,#FFFFFF);border:1px solid #F6D9A8;border-radius:14px;padding:15px 16px;margin-bottom:16px;}
.vhead .who{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--laranja-esc);font-weight:800;}
.vhead .nm{font-size:21px;font-weight:800;color:var(--azul);margin:1px 0 8px;}
.vhead .ln{font-size:13.5px;color:#3a4855;}
.vhead .ln b{color:var(--laranja-esc);}

/* memo / explica */
.explain{background:var(--box);border:1px dashed var(--azul);border-radius:11px;padding:12px 14px;margin:14px 0;font-size:12.5px;color:#33414e;}
.explain b{color:var(--azul);}
.explain .f{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#fff;border:1px solid var(--linha);border-radius:6px;padding:7px 9px;margin:7px 0;color:var(--tinta);display:block;}

/* fase placeholder */
.fase{background:var(--papel);border:1px solid var(--linha);border-radius:16px;padding:26px 20px;text-align:center;box-shadow:0 1px 6px rgba(9,48,86,.04);}
.fase .ic{font-size:38px;}
.fase .tag{display:inline-block;background:var(--laranja);color:#2a1900;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 11px;border-radius:20px;margin:10px 0 4px;}
.fase h2{font-size:19px;color:var(--azul);font-weight:800;margin-bottom:8px;}
.fase p{font-size:13.5px;color:var(--cinza);max-width:440px;margin:0 auto 8px;}
.fase .what{text-align:left;max-width:460px;margin:14px auto 0;background:var(--box);border:1px solid var(--linha);border-radius:11px;padding:13px 15px;}
.fase .what h4{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;}
.fase .what li{font-size:12.5px;color:#3a4855;list-style:none;padding-left:18px;position:relative;margin-bottom:6px;}
.fase .what li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:2px;background:var(--laranja);}
.fase .src{font-size:11px;color:var(--cinza-cl);margin-top:11px;}

/* mini meta cards (pacing) */
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:12px;}
.mc{background:#fff;border:1px solid var(--linha);border-radius:11px;padding:11px 13px;text-align:left;}
.mc .p{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--cinza);font-weight:700;}
.mc .q{font-size:19px;font-weight:800;color:var(--azul);margin-top:2px;}
.mc .u{font-size:11px;color:var(--cinza-cl);}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(78px + var(--sb));transform:translateX(-50%);background:var(--tinta);color:#fff;font-size:12.5px;padding:9px 16px;border-radius:22px;z-index:60;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:90%;text-align:center;}
.toast.show{opacity:1;}

footer{padding:16px 14px 8px;text-align:center;font-size:10.5px;color:var(--cinza-cl);}

@media(min-width:560px){.kpis{grid-template-columns:repeat(4,1fr);}}
.rvsel{margin-bottom:14px;}
.rvsel select{width:100%;background:#fff;border:1px solid var(--linha);color:var(--tinta);font-size:14px;font-weight:600;padding:11px 12px;border-radius:11px;appearance:none;cursor:pointer;}
.vhead .flag{margin-top:10px;font-size:12px;background:#FCEFEA;border:1px solid #F2C9B8;color:#9A4423;border-radius:9px;padding:8px 11px;line-height:1.4;}
.zonebar{display:flex;gap:8px;margin-bottom:6px;}
.zb{flex:1;background:#fff;border:1px solid var(--linha);border-radius:11px;padding:10px 6px;font-size:10.5px;color:var(--cinza);text-align:center;font-weight:600;}
.zb .zd{display:block;width:14px;height:14px;border-radius:4px;margin:0 auto 5px;}
.zb b{display:block;font-size:20px;color:var(--azul);margin-top:3px;}
.tg{font-size:9px;background:#E7ECF1;color:#5B6B7A;padding:2px 6px;border-radius:10px;font-weight:700;vertical-align:middle;}

.empty{background:var(--papel);border:1px solid var(--linha);border-radius:16px;padding:34px 22px;text-align:center;box-shadow:0 1px 6px rgba(9,48,86,.04);margin-top:8px;}
.empty .ic{font-size:42px;}
.empty h2{font-size:20px;color:var(--azul);font-weight:800;margin:10px 0 8px;}
.empty p{font-size:14px;color:var(--cinza);max-width:460px;margin:0 auto 8px;}
.empty .btn{display:inline-block;margin-top:14px;background:var(--laranja);color:#2a1900;font-weight:800;font-size:15px;padding:12px 22px;border-radius:12px;border:none;cursor:pointer;}
.empty .btn:active{transform:scale(.97);}
.empty .sec{margin-top:14px;font-size:11.5px;color:var(--cinza-cl);}
.gen{text-align:center;font-size:11px;color:var(--cinza-cl);margin:2px 0 12px;}
.tg.orf{background:#F3E2DA;color:#9A4423;}
</style>
</head>

<script>
/* ===== camada de dados (vazia até carregar) ===== */
let DATA=null, RET=null, VENDS=[], RVENDS=[];
const S={role:'gestor',vend:null,rvend:null,selVend:null,tab:'conquista',selMeso:null};
let ORPHAN=new Set();  /* vendedores órfãos derivados do flag dos dados — nenhum nome fixo na casca */

const nf=n=>Number(n).toLocaleString('pt-BR');
const nf1=n=>Number(n).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1});
const STCOL={conquistar:'var(--conq)',equilibrio:'var(--equi)',atendido:'var(--atend)'};
const STLAB={conquistar:'A conquistar',equilibrio:'Equilíbrio',atendido:'Bem atendido'};
const ZCOL={quente:'#F0A93A',alerta:'#E8743B',perda:'#C2453B',ciclo:'#2E8B6A'};
const ZLAB={quente:'Quente · atrasado',alerta:'Alerta',perda:'Risco de perda',ciclo:'No ciclo'};

/* ===== IndexedDB (cache só no aparelho) ===== */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('copilotoSP',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('kv');r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});}
async function idbGet(k){try{const db=await idb();return await new Promise((res)=>{const t=db.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>res(null);});}catch(e){return null;}}
async function idbSet(k,v){try{const db=await idb();const t=db.transaction('kv','readwrite');t.objectStore('kv').put(v,k);}catch(e){}}

function ingest(d){
  DATA=d.meso; RET=d.ret;
  VENDS=[...new Set(DATA.flatMap(x=>x.cons))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  ORPHAN=new Set(RET.fila.filter(o=>o.orf).map(o=>o.vend));
  RVENDS=[...new Set(RET.fila.map(o=>o.vend))].filter(v=>!ORPHAN.has(v)).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const vs=document.getElementById('vendsel');
  vs.innerHTML='<option value="">— escolha o vendedor —</option>'+VENDS.map(v=>`<option value="${v}">${v}</option>`).join('');
}
async function boot(){const d=await idbGet('dados'); if(d){ingest(d);} render();}

/* ===== carregar arquivo ===== */
document.getElementById('btnref').addEventListener('click',()=>document.getElementById('fileinp').click());
document.getElementById('fileinp').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
      if(!d.meso||!d.ret){toast('Arquivo inválido.');return;}
      ingest(d); idbSet('dados',d); S.selMeso=null;S.selVend=null; render(); toast('Dados carregados ('+(d.gerado||'')+').');
    }catch(err){toast('Não consegui ler o arquivo.');}};
  r.readAsText(f,'utf-8');
  e.target.value='';
});

/* ===== toast ===== */
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}

/* ===== mapa ===== */
function bounds(){let a=1e9,b=1e9,c=-1e9,e=-1e9;MAPGEO.forEach(g=>(g.path.match(/-?\d+\.?\d*/g)||[]).forEach((v,i)=>{v=+v;if(i%2===0){a=Math.min(a,v);c=Math.max(c,v);}else{b=Math.min(b,v);e=Math.max(e,v);}}));return [a,b,c,e];}
function buildMap(regions){
  const [a,b,c,e]=bounds(),p=8,vb=`${a-p} ${b-p} ${(c-a)+2*p} ${(e-b)+2*p}`;
  const inset=new Set(regions.map(r=>r.meso));
  const byName=Object.fromEntries(DATA.map(d=>[d.meso,d]));
  const paths=MAPGEO.map(g=>{const d=byName[g.meso];const act=inset.has(g.meso);
    const fill=act&&d?STCOL[d.status]:'#D7DEE6';const op=act?1:.45;
    return `<path d="${g.path}" fill="${fill}" opacity="${op}" class="${S.selMeso===g.meso?'sel':''}" data-m="${g.meso.replace(/"/g,'')}"></path>`;}).join('');
  return `<div class="mapwrap"><svg viewBox="${vb}" role="img">${paths}</svg>
    <div class="leg"><span><i style="background:var(--conq)"></i>A conquistar</span><span><i style="background:var(--equi)"></i>Equilíbrio</span><span><i style="background:var(--atend)"></i>Bem atendido</span></div></div>`;
}
function drill(d){const dop=(d.d_opp>0?'+':'')+nf1(d.d_opp),oop=(d.o_opp>0?'+':'')+nf1(d.o_opp);
  return `<div class="drill"><h3>${d.meso}</h3>
    <div class="meta">Penetração combinada ${nf1(d.pen_tot)}% · mercado/vendedor ${nf(d.mks)} ${d.mks>250?'· acima do teto (250)':''}</div>
    <div class="dg">
      <div class="dcell"><div class="l">GAP postos BB</div><div class="v">${nf(d.gap_bb)}</div></div>
      <div class="dcell"><div class="l">GAP consumidor final</div><div class="v">${nf(d.gap_cf)}</div></div>
      <div class="dcell"><div class="l">Oport. Diesel</div><div class="v ${d.d_opp>0?'pos':'neg'}">${dop} <small style="font-size:11px">p.p.</small></div></div>
      <div class="dcell"><div class="l">Oport. Otto</div><div class="v ${d.o_opp>0?'pos':'neg'}">${oop} <small style="font-size:11px">p.p.</small></div></div>
    </div><div class="cons">Responsáveis: <b>${d.cons.join(' · ')}</b></div></div>`;}
function rankRow(d,metric){const big=metric==='mks'?nf(d.mks):nf(d.gap_tot);const sm=metric==='mks'?'merc./vend.':'instalações';
  const op=Math.max(d.d_opp,d.o_opp);const opTxt=(op>0?'+':'')+nf1(op)+' p.p.';
  return `<div class="row" data-m="${d.meso.replace(/"/g,'')}"><div class="bar" style="background:${STCOL[d.status]}"></div>
    <div class="mn"><div class="nm">${d.meso}</div><div class="ms"><span class="chip ${d.status}">${STLAB[d.status]}</span> &nbsp;pen. BB ${nf1(d.pen_bb)}% · oport. <span class="opp ${op>0?'pos':'neg'}">${opTxt}</span></div></div>
    <div class="rt"><div class="big">${big}</div><div class="sm">${sm}</div></div></div>`;}

function conquistaGestor(){
  const tBB=DATA.reduce((s,d)=>s+d.anp_bb,0),rBB=DATA.reduce((s,d)=>s+d.royal_bb,0);
  const tCF=DATA.reduce((s,d)=>s+d.anp_cf,0),rCF=DATA.reduce((s,d)=>s+d.royal_cf,0);
  const gap=DATA.reduce((s,d)=>s+d.gap_tot,0),sub=DATA.filter(d=>d.mks>250).length;
  let h=`<div class="gen">Conquista · base ANP de ${RET.ref.slice(3)} </div><div class="kpis">
    <div class="kpi"><div class="lab">Penetração postos BB</div><div class="val">${nf1(rBB/tBB*100)}<small>%</small></div><div class="note">${nf(rBB)} de ${nf(tBB)} postos</div></div>
    <div class="kpi"><div class="lab">Penetração cons. final</div><div class="val">${nf1(rCF/tCF*100)}<small>%</small></div><div class="note">${nf(rCF)} de ${nf(tCF)}</div></div>
    <div class="kpi hi"><div class="lab">GAP total a conquistar</div><div class="val">${nf(gap)}</div><div class="note">instalações não atendidas</div></div>
    <div class="kpi"><div class="lab">Mesorregiões subcobertas</div><div class="val">${sub}<small> / 15</small></div><div class="note">mercado/vendedor &gt; 250</div></div></div>`;
  h+=`<div class="secttl">Mapa de oportunidade — toque numa região</div>`+buildMap(DATA);
  if(S.selMeso){h+=drill(DATA.find(d=>d.meso===S.selMeso));}
  h+=`<div class="secttl">Pressão de cobertura (mercado/vendedor)</div>`+[...DATA].sort((a,b)=>b.mks-a.mks).map(d=>rankRow(d,'mks')).join('');
  h+=`<div class="explain"><b>Régua de capacidade.</b> Teto sustentável ≈ 250 clientes ativos por vendedor.
    <span class="f">Mercado/vendedor = (postos ANP + consumidor final) ÷ nº consultores</span>
    Acima de 250 = região pressionada — candidata a reforço antes de cobrar mais conquista.</div>`;
  return h;
}
function conquistaVendedor(){
  if(!S.vend) return `<div class="fase"><div class="ic">👤</div><h2>Selecione um vendedor</h2><p>Escolha o consultor no topo para ver as frentes de conquista da carteira dele.</p></div>`;
  const regs=DATA.filter(d=>d.cons.includes(S.vend)).sort((a,b)=>b.gap_tot-a.gap_tot);
  const gap=regs.reduce((s,d)=>s+d.gap_tot,0),top=regs[0];
  let h=`<div class="vhead"><div class="who">Frentes de conquista</div><div class="nm">${S.vend}</div>
    <div class="ln">Você atua em <b>${regs.length}</b> mesorregião(ões), com <b>${nf(gap)}</b> instalações ainda não atendidas. Sua maior frente é <b>${top.meso}</b>.</div></div>`;
  h+=`<div class="secttl">Sua região no estado</div>`+buildMap(regs);
  if(S.selMeso&&regs.some(d=>d.meso===S.selMeso)){h+=drill(DATA.find(d=>d.meso===S.selMeso));}
  h+=`<div class="secttl">Onde conquistar primeiro</div>`;
  h+=regs.map(d=>{const sh=d.cons.filter(c=>c!==S.vend);let r=rankRow(d,'gap');
    if(sh.length){r=r.replace('</div>\n    </div>\n    <div class="rt">',`</div><div class="ms" style="margin-top:3px;color:var(--cinza-cl)">compartilhada com ${sh.join(', ')}</div></div><div class="rt">`);}
    return r;}).join('');
  h+=`<div class="explain"><b>Como ler.</b> O número é o <b>GAP</b> — instalações ANP que ainda não compram da Royal. Oportunidade em p.p. indica mais mercado que presença.
    <span class="f">GAP = clientes totais (ANP) − atendidos · Índice = part. potencial − part. vendas (p.p.)</span>
    Priorize GAP alto com oportunidade positiva.</div>`;
  return h;
}

/* ===== RETOMADA ===== */
const filaDe=v=>RET.fila.filter(o=>o.vend===v).sort((a,b)=>b.pri-a.pri);
function retRow(o){return `<div class="row" style="cursor:default"><div class="bar" style="background:${ZCOL[o.zona]}"></div>
  <div class="mn"><div class="nm">Cliente ${o.cli} · ${o.cidade}${o.orf?' <span class="tg orf">órfã</span>':''}</div>
  <div class="ms"><span class="chip" style="background:${ZCOL[o.zona]}22;color:${ZCOL[o.zona]}">${ZLAB[o.zona]}</span> &nbsp;${o.seg} · ciclo ${o.cycle}d · parado ${o.lapso}d (${o.ratio}×)</div></div>
  <div class="rt"><div class="big">${nf(o.volm)}</div><div class="sm">m³/mês · prop ${o.prop}</div></div></div>`;}
function retomadaVendedor(){
  const sel=`<div class="rvsel"><select id="rvendsel"><option value="">— escolha o vendedor da carteira —</option>${RVENDS.map(v=>`<option value="${v}"${v===S.rvend?' selected':''}>${v}</option>`).join('')}</select></div>`;
  if(!S.rvend) return sel+`<div class="fase"><div class="ic">↩️</div><h2>Fila de Retomada</h2><p>Escolha o vendedor da carteira para ver os clientes prestes a se perder, em ordem de prioridade.</p></div>`;
  const f=filaDe(S.rvend),vol=Math.round(f.reduce((s,o)=>s+o.volm,0));
  const head=`<div class="vhead"><div class="who">Sua fila de retomada</div><div class="nm">${S.rvend}</div>
    <div class="ln">Você tem <b>${nf(f.length)}</b> clientes atrasados, somando <b>${nf(vol)}</b> m³/mês em jogo. Comece pelo topo. O que decide a urgência não é dias parado, e sim quantos ciclos <b>dele</b>.</div></div>`;
  const ex=`<div class="explain"><b>Como ler.</b> "parado 30d (2,3×)" = está há 30 dias sem comprar, 2,3 vezes o ritmo normal dele. Acima de ~2× é alerta.
    <span class="f">Ciclo = (1ª→última) ÷ (dias de compra − 1) · Sinal = lapso ÷ ciclo · Fila = propensão × volume</span>
    Referência: ${RET.ref}. Spot/esporádicos ficam fora (reconquista, não retenção).</div>`;
  return sel+head+f.map(retRow).join('')+ex;
}
function retomadaGestor(){
  const f=RET.fila,volB=Math.round(f.reduce((s,o)=>s+o.volm,0));
  const orf=f.filter(o=>o.orf),volO=Math.round(orf.reduce((s,o)=>s+o.volm,0)),volL=volB-volO;
  const nOrf=[...new Set(orf.map(o=>o.vend))].length;
  const zc={quente:0,alerta:0,perda:0};f.forEach(o=>zc[o.zona]!==undefined&&zc[o.zona]++);
  let h=`<div class="gen">Retomada · referência ${RET.ref}</div><div class="kpis">
    <div class="kpi"><div class="lab">Clientes na fila</div><div class="val">${nf(f.length)}</div><div class="note">recorr./interm. atrasados</div></div>
    <div class="kpi hi"><div class="lab">Risco bruto</div><div class="val">${nf(volB)}<small> m³</small></div><div class="note">esperado/mês</div></div>
    <div class="kpi"><div class="lab">Risco líquido</div><div class="val">${nf(volL)}<small> m³</small></div><div class="note">−${nf(volO)} órfã</div></div>
    <div class="kpi"><div class="lab">Carteiras órfãs</div><div class="val">${nOrf}</div><div class="note">ex-vendedores · redistribuir</div></div></div>`;
  h+=`<div class="secttl">Distribuição por urgência</div><div class="zonebar">`+['quente','alerta','perda'].map(z=>`<div class="zb"><span class="zd" style="background:${ZCOL[z]}"></span>${ZLAB[z]}<b>${nf(zc[z])}</b></div>`).join('')+`</div>`;
  h+=`<div class="secttl">Risco por vendedor — toque para ver a fila</div>`;
  const allV=[...new Set(f.map(o=>o.vend))];
  const byV=allV.map(v=>{const ff=f.filter(o=>o.vend===v);return{v,n:ff.length,vol:Math.round(ff.reduce((s,o)=>s+o.volm,0)),orf:ORPHAN.has(v)};}).sort((a,b)=>b.vol-a.vol);
  h+=byV.map(r=>`<div class="row" data-v="${r.v.replace(/"/g,'')}"><div class="bar" style="background:${r.orf?'#9AA7B3':'var(--laranja)'}"></div>
    <div class="mn"><div class="nm">${r.v}${r.orf?' <span class="tg orf">órfã · redistribuir</span>':''}</div><div class="ms">${nf(r.n)} clientes na fila</div></div>
    <div class="rt"><div class="big">${nf(r.vol)}</div><div class="sm">m³/mês em risco</div></div></div>`).join('');
  if(S.selVend){h+=`<div class="secttl">Fila de ${S.selVend} (top 40)</div>`+filaDe(S.selVend).slice(0,40).map(retRow).join('');}
  h+=`<div class="explain"><b>Bruto × líquido.</b> Carteiras de ex-vendedores entram como <b>órfãs a redistribuir</b>: o risco não é cobrança de substituto. O líquido (${nf(volL)} m³) é a leitura justa da equipe.
    <span class="f">Risco líquido = risco bruto − carteiras órfãs</span>
    Auxiliares da Mesa ficam fora da fila. Referência: ${RET.ref}.</div>`;
  return h;
}

/* ===== fases futuras ===== */
function faseCross(){return `<div class="fase"><div class="ic">🧺</div><div class="tag">Fase 2</div><h2>Cross-sell / Cesta</h2>
  <p>Clientes que já compram, mas poderiam levar mais um produto — a lacuna entre a cesta atual e o mix do segmento.</p>
  <div class="what"><h4>O que vai mostrar</h4><ul><li>Seus clientes com cesta incompleta vs. o segmento.</li><li>Produto a oferecer e tamanho estimado.</li></ul></div>
  <p class="src">Entra na base de produtos por cliente-dia.</p></div>`;}
function fasePacing(){const meta=[['S10',38158],['S500',12810],['Gasolina',12420],['Hidratado',1012]];const tot=meta.reduce((s,m)=>s+m[1],0);
  const mc=meta.map(m=>`<div class="mc"><div class="p">${m[0]}</div><div class="q">${nf(m[1])}</div><div class="u">m³ · ${nf1(m[1]/tot*100)}% do mix</div></div>`).join('');
  return `<div class="fase"><div class="ic">📈</div><div class="tag">Fase 3</div><h2>Pacing de Meta</h2>
  <p>Seu atingimento e ritmo necessário/dia, lendo a meta pela Equação de Ouro — gap em alcance vs. valor.</p>
  <div class="what"><h4>Meta de referência — SP, jun/2026 (m³)</h4><div class="mgrid">${mc}</div>
  <p class="src" style="margin-top:11px">Total ${nf(tot)} m³ · diesel ${nf1((38158+12810)/tot*100)}%.</p></div>
  <p class="src">Volume = Clientes × Frequência × Ticket · Atingimento = acumulado ÷ meta.</p></div>`;}

/* ===== empty state ===== */
function emptyState(){
  return `<div class="empty"><div class="ic">📂</div><h2>Carregue os dados no aparelho</h2>
    <p>Esta página é só a interface — não traz nenhum dado da Royal. Toque abaixo e selecione o arquivo <b>copiloto_dados.json</b> que está no seu aparelho.</p>
    <button class="btn" onclick="document.getElementById('fileinp').click()">⟳ Carregar copiloto_dados.json</button>
    <div class="sec">Os dados ficam guardados só neste aparelho (cache local) e reabrem sozinhos na próxima vez.</div></div>`;
}

/* ===== render ===== */
function render(){
  const m=document.getElementById('main');
  const subm={conquista:'Conquista',retomada:'Retomada',crosssell:'Cross-sell',pacing:'Pacing'};
  document.getElementById('vendwrap').classList.toggle('hide', !(DATA&&S.tab==='conquista'&&S.role==='vendedor'));
  if(!DATA||!RET){
    if(S.tab==='crosssell'){m.innerHTML=faseCross();}
    else if(S.tab==='pacing'){m.innerHTML=fasePacing();}
    else {m.innerHTML=emptyState();}
    document.getElementById('subref').textContent='Carregue os dados';
    return;
  }
  if(S.tab==='conquista'){m.innerHTML=S.role==='gestor'?conquistaGestor():conquistaVendedor();}
  else if(S.tab==='retomada'){m.innerHTML=S.role==='gestor'?retomadaGestor():retomadaVendedor();}
  else if(S.tab==='crosssell'){m.innerHTML=faseCross();}
  else {m.innerHTML=fasePacing();}
  document.getElementById('subref').textContent = subm[S.tab]+' · '+RET.ref;
  m.querySelectorAll('[data-m]').forEach(el=>el.addEventListener('click',()=>{const mm=el.getAttribute('data-m');S.selMeso=(S.selMeso===mm)?null:mm;render();setTimeout(()=>{const d=document.querySelector('.drill');if(d)d.scrollIntoView({behavior:'smooth',block:'center'});},60);}));
  const rv=document.getElementById('rvendsel'); if(rv) rv.addEventListener('change',()=>{S.rvend=rv.value||null;render();});
  m.querySelectorAll('[data-v]').forEach(el=>el.addEventListener('click',()=>{const vv=el.getAttribute('data-v');S.selVend=(S.selVend===vv)?null:vv;render();setTimeout(()=>{const d=[...document.querySelectorAll('.secttl')].pop();if(d)d.scrollIntoView({behavior:'smooth',block:'start'});},60);}));
}

document.getElementById('roleseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;S.role=b.dataset.role;S.selMeso=null;document.querySelectorAll('#roleseg button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;S.tab=b.dataset.tab;S.selMeso=null;document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('vendsel').addEventListener('change',function(){S.vend=this.value||null;S.selMeso=null;render();});

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
boot();
</script>
</body>
</html>
