<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Limpando cache...</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
         justify-content: center; height: 100vh; margin: 0; background: #0d2b5e; color: white; }
  h2 { font-size: 1.4rem; }
  p { font-size: 1rem; opacity: 0.8; }
  .ok { color: #4caf50; font-size: 2rem; }
</style>
</head>
<body>
<h2>🔄 Limpando cache...</h2>
<p id="msg">Aguarde...</p>
<script>
(async () => {
  const msg = document.getElementById('msg');
  try {
    // Unregister all service workers
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) await reg.unregister();

    // Clear all caches
    const keys = await caches.keys();
    for (const key of keys) await caches.delete(key);

    msg.textContent = 'Cache limpo! Redirecionando para o app v11...';
    document.querySelector('h2').innerHTML = '<span class="ok">✓</span> Pronto!';
  } catch(e) {
    msg.textContent = 'Erro: ' + e.message + ' — tentando redirecionar...';
  }
  setTimeout(() => { window.location.href = '/Vendedores/?v11=' + Date.now(); }, 1500);
})();
</script>
</body>
</html>
