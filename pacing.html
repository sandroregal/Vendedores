<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Pacing Vendedores — Royal FIC SP</title>
<style>
:root{
  --azul:#0E4C89; --azul2:#0a3a69; --laranja:#F89D1B; --laranja2:#e08a0c;
  --verde:#16a34a; --amarelo:#F89D1B; --vermelho:#dc2626;
  --bg:#eef2f6; --card:#ffffff; --ink:#16263a; --muted:#65788f; --line:#e3e9f0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-text-size-adjust:100%}
.app{max-width:560px;margin:0 auto;padding:0 0 28px}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 16px;position:sticky;top:0;z-index:50;
  box-shadow:0 4px 16px rgba(10,45,90,.25)}
.htop{display:flex;align-items:center;gap:12px}
.badge{background:#fff;border-radius:10px;padding:6px 9px;display:flex;align-items:center;flex:0 0 auto}
.badge img{height:24px;display:block}
.htxt{flex:1;min-width:0}
.htitle{font-size:15px;font-weight:800;letter-spacing:.2px;line-height:1.15}
.hsub{font-size:11.5px;opacity:.85;margin-top:2px}
.btn-up{background:var(--laranja);color:#3a2400;border:none;border-radius:10px;
  font-weight:800;font-size:12.5px;padding:9px 12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.btn-up:active{background:var(--laranja2)}
.card{background:var(--card);border-radius:16px;margin:14px 14px 0;padding:16px;
  box-shadow:0 2px 10px rgba(20,40,70,.06)}
.card h3{margin:0 0 8px;font-size:12px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 14px 0}
.kpi{background:var(--card);border-radius:14px;padding:13px 13px 12px;
  box-shadow:0 2px 10px rgba(20,40,70,.06);border-left:4px solid var(--azul)}
.kpi.warn{border-left-color:var(--vermelho)}
.kpi.ok{border-left-color:var(--verde)}
.kpi .lab{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kpi .big{font-size:21px;font-weight:800;margin-top:3px;line-height:1.05}
.kpi .unit{font-size:12px;font-weight:700;color:var(--muted)}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}
.tabs{display:flex;gap:6px;margin:16px 14px 0;background:#dde6ef;border-radius:12px;padding:4px}
.tab{flex:1;text-align:center;font-size:12.5px;font-weight:700;color:var(--muted);
  padding:8px 4px;border-radius:9px;cursor:pointer;white-space:nowrap}
.tab.on{background:#fff;color:var(--azul);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.rows{margin:10px 14px 0}
.row{padding:12px;background:var(--card);border-radius:12px;margin-bottom:8px;
  box-shadow:0 2px 8px rgba(20,40,70,.05)}
.rhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.rname{font-size:14px;font-weight:800}
.rpct{font-size:12px;font-weight:700;padding:2px 7px;border-radius:6px}
.rpct.g{background:#d4edda;color:#0f5132}
.rpct.y{background:#fff3cd;color:#664d03}
.rpct.r{background:#f8d7da;color:#842029}
.rdetail{display:flex;gap:10px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.rdetail b{color:var(--ink)}
.track{position:relative;height:12px;background:#eef2f6;border-radius:6px;overflow:visible;margin-top:6px}
.fill{position:absolute;top:0;left:0;height:100%;border-radius:6px;transition:width .35s}
.metaflag{position:absolute;top:-2px;width:2px;height:16px;background:var(--ink);border-radius:1px;z-index:2}
.legend{font-size:10.5px;color:var(--muted);margin:10px 14px 0;display:flex;gap:14px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%}
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.prod-item{text-align:center;padding:8px 4px;background:#f6f8fa;border-radius:8px}
.prod-item .pv{font-size:13px;font-weight:800}
.prod-item .pl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.benchrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;
  border-bottom:1px solid var(--line)}
.benchrow:last-child{border-bottom:none}
.benchrow .bn{font-size:13px;font-weight:700;flex:1}
.benchrow .bv{font-size:12px;font-weight:700;text-align:right;min-width:50px}
.benchrow .bl{font-size:11px;color:var(--muted);text-align:right;min-width:60px}
footer{text-align:center;font-size:10.5px;color:var(--muted);margin-top:18px;padding:0 16px;line-height:1.5}
#fileIn{position:absolute;left:-9999px}
.flash{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--azul);color:#fff;
  padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;z-index:99;
  box-shadow:0 6px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;pointer-events:none}
.flash.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty h2{color:var(--ink);font-size:18px;margin-bottom:8px}
.obs{font-size:10.5px;color:var(--muted);font-style:italic;margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="htop">
      <div class="badge"><img src="icon-192.png" alt="Royal FIC"></div>
      <div class="htxt">
        <div class="htitle">Pacing Vendedores SP</div>

<input type="file" id="fileIn" accept=".csv,text/csv,text/plain">

<script>
/* ===== META JULHO 2026 — Regional SP ===== */
const META_MES = 'jul/2026';
const DIAS_UTEIS = 24.0; // seg-sex=1, sab=0.5, dom=0; feriado 09/07 removido
const FERIADOS = new Set(['2026-07-09']);

const VENDEDORES = [
  {nome:'Kelly',     s10:7814, s500:1801, gas:1706, hid:532,  cli:152, obs:'cobre Valter (férias)'},
  {nome:'Luís',      s10:4302, s500:934,  gas:1552, hid:0,    cli:118, obs:'férias 10d ef.'},
  {nome:'Amauri',    s10:3272, s500:2063, gas:722,  hid:9,    cli:101, obs:null},
  {nome:'Jeferson',  s10:3023, s500:1070, gas:1860, hid:44,   cli:138, obs:null},
  {nome:'Jéssica',   s10:3835, s500:882,  gas:1175, hid:0,    cli:114, obs:'cobre Luís (férias)'},
  {nome:'Sérgio Elias', s10:2387, s500:2242, gas:438, hid:86, cli:122, obs:null},
  {nome:'Rogério',   s10:2753, s500:928,  gas:1083, hid:40,   cli:88,  obs:'cobre S.Cardoso (férias)'},
  {nome:'Sérgio Cardoso', s10:3133, s500:554, gas:788, hid:120, cli:60, obs:'férias 5d ef.'},
  {nome:'Valter',    s10:3320, s500:637,  gas:362,  hid:195,  cli:36,  obs:'férias 16d ef.'},
  {nome:'Driele',    s10:1874, s500:743,  gas:787,  hid:36,   cli:132, obs:'cobre Silvana (férias)'},
  {nome:'Michelly',  s10:1429, s500:375,  gas:1480, hid:9,    cli:91,  obs:null},
  {nome:'Taciana',   s10:1399, s500:837,  gas:435,  hid:0,    cli:105, obs:null},
  {nome:'ST01',      s10:1258, s500:57,   gas:487,  hid:0,    cli:48,  obs:null},
  {nome:'Silvana',   s10:691,  s500:354,  gas:457,  hid:25,   cli:42,  obs:'férias 11d ef.'},
  {nome:'Roberto',   s10:880,  s500:422,  gas:21,   hid:0,    cli:16,  obs:null},
  {nome:'Neusa',     s10:58,   s500:14,   gas:79,   hid:2,    cli:3,   obs:'férias 11d ef.'},
  {nome:'Tatyana',   s10:49,   s500:11,   gas:67,   hid:2,    cli:3,   obs:'cobre Neusa (férias)'}
];
VENDEDORES.forEach(v => v.total = v.s10 + v.s500 + v.gas + v.hid);

const BENCH_CLI = {
  'Valter':125.4,'Roberto':82.7,'Sérgio Cardoso':76.4,'Amauri':59.8,'Luís':57.6,
  'Neusa':51,'Rogério':49.9,'Jeferson':43.5,'Sérgio Elias':42.2,'ST01':37.5,
  'Silvana':36.3,'Michelly':36.2,'Kelly':35.3,'Jéssica':34.8,'Taciana':25.4,'Driele':22.4
};

const SP_ESC = new Set(['FI09','FI10','FI13','FI22','FI27']);

/* ===== IndexedDB — lê mapeamento cliente→vendedor do Copiloto ===== */
let EMB_VENDS = null; // array de nomes de vendedores por índice
let EMB_HIST = null;  // {clientId: {vd: vendIndex, ...}}

function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('copilotoSP',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('kv');r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});}
async function idbGet(k){try{const db=await idb();return await new Promise((res)=>{const t=db.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>res(null);});}catch(e){return null;}}

async function loadEMB(){
  try{
    const base = await idbGet('base');
    if(base && base.emb && base.emb.vends && base.emb.hist){
      EMB_VENDS = base.emb.vends;
      EMB_HIST = base.emb.hist;
      console.log('EMB carregado:',EMB_VENDS.length,'vendedores,',Object.keys(EMB_HIST).length,'clientes');
      return true;
    }
  }catch(e){console.warn('Falha ao ler EMB:',e);}
  return false;
}

/* ===== Parsear YVIEWCOPA ===== */
function parseDate(s){
  s=(s||'').trim();
  let m=s.match(/^(\d{2})[.\/](\d{2})[.\/](\d{4})/);
  if(!m) return null;
  return new Date(+m[3],+m[2]-1,+m[1]);
}
function artFam(code){
  code=(code||'').trim().slice(-3);
  if(code==='101'||code==='102'||code==='103') return 'gas';
  if(code==='146'||code==='147'||code==='148') return 's10';
  if(code==='140'||code==='141') return 's500';
  if(code==='109') return 'hid';
  return null;
}
function vendNorm(s){return (s||'').trim().toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}

function classifySeg(band2){
  const s = (band2||'').trim().toUpperCase();
  if(s.includes('BANDEIRA BRANCA')) return 'Bandeira Branca';
  if(s.includes('CONSUMIDOR FINAL')) return 'Consumidor Final';
  if(s.includes('BANDEIRADO')) return 'Bandeirado';
  if(s.includes('USINA')) return 'Usinas';
  if(s.includes('TRR') || s.includes('RETALHISTA')) return 'TRR';
  if(s==='CONGENERE'||s==='N.D'||s==='N/D'||s==='ND'||s.includes('CONGENERE')) return 'Congênere';
  return 'Outros';
}

function resolveVend(cli){
  if(!EMB_HIST || !EMB_VENDS) return null;
  const h = EMB_HIST[cli];
  if(!h) return null;
  return EMB_VENDS[h.vd] || null;
}

function parseCSV(txt){
  const lines = txt.split(/\r?\n/);
  const vends = {};
  let maxDate = null;
  let noEmb = 0;
  for(let i=1;i<lines.length;i++){
    const c = lines[i].split(';');
    if(c.length < 50) continue;
    const esc = (c[16]||'').trim();
    if(!SP_ESC.has(esc)) continue;
    const fam = artFam(c[7]);
    if(fam === null) continue;
    const d = parseDate(c[6]);
    if(!d) continue;
    const q = parseFloat((c[24]||'0').replace(/\./g,'').replace(',','.'))||0;
    const cli = (c[49]||'').trim().replace(/^0+/,'');
    if(!cli) continue;
    // Resolve vendedor via EMB (cliente→vendedor), fallback para c[21]
    let vendName = resolveVend(cli);
    if(!vendName){
      vendName = (c[21]||'').trim();
      noEmb++;
    }
    if(!vendName) continue;
    if(!maxDate || d > maxDate) maxDate = d;
    if(!vends[vendName]) vends[vendName] = {vol:{s10:0,s500:0,gas:0,hid:0},segs:{},clientes:new Set(),dias:new Set()};
    const v = vends[vendName];
    v.vol[fam] += q;
    const seg = classifySeg(c[23]);
    v.segs[seg] = (v.segs[seg]||0) + q;
    v.clientes.add(cli);
    const dk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    v.dias.add(dk);
  }
  return {vends, maxDate, noEmb};
}

/* ===== Dias úteis ===== */
function effDays(year, month, through){
  const last = new Date(year, month, 0).getDate();
  const end = through || last;
  let s = 0;
  for(let d=1; d<=end; d++){
    const dt = new Date(year, month-1, d);
    const key = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(FERIADOS.has(key)) continue;
    const w = dt.getDay();
    if(w === 0) continue;
    s += (w === 6) ? 0.5 : 1;
  }
  return s;
}

/* ===== Match vendedor ===== */
function matchVend(csvName){
  const n = vendNorm(csvName);
  // 1. Exact
  for(const v of VENDEDORES) if(n === vendNorm(v.nome)) return v;
  // 2. Longest contains wins (avoids "SERGIO" matching first Sérgio in array)
  let best=null, bestLen=0;
  for(const v of VENDEDORES){
    const vn = vendNorm(v.nome);
    if((n.includes(vn)||vn.includes(n)) && vn.length>bestLen){best=v;bestLen=vn.length;}
  }
  if(best) return best;
  // 3. All tokens of vendedor name appear in CSV name
  for(const v of VENDEDORES){
    const tokens = vendNorm(v.nome).split(/\s+/);
    if(tokens.length>1 && tokens.every(t=>n.includes(t))) return v;
  }
  // 4. First name only if unambiguous
  const fm = VENDEDORES.filter(v=>{const f=vendNorm(v.nome).split(/\s+/)[0];return f&&n.startsWith(f);});
  if(fm.length===1) return fm[0];
  return null;
}

/* ===== Render ===== */
const nf = n => Number(n).toLocaleString('pt-BR');
const nf1 = n => Number(n).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1});
let DATA = null;
let TAB = 'volume';

function renderAnalise(results, data){
  const {factor, effEl, effFull, totalMeta, totalReal} = data;
  const pctTime = effEl / effFull * 100;
  let h = '';

  // --- 1. PRODUTO — visão consolidada do time ---
  const prodKeys = ['s10','s500','gas','hid'];
  const prodLabels = {s10:'Diesel S10',s500:'Diesel S500',gas:'Gasolina',hid:'Hidratado'};
  const totalMetaP = {s10:41477,s500:13924,gas:13499,hid:1100};

  h += '<div class="card"><h3>Produto — Desempenho do Time</h3>';
  for(const pk of prodKeys){
    const real = results.reduce((s,r)=>s+r.realProd[pk],0);
    const meta = totalMetaP[pk];
    const pct = meta > 0 ? real/meta*100 : 0;
    const proj = real * factor;
    const projPct = meta > 0 ? proj/meta*100 : 0;
    const gap = meta - real;
    const status = projPct >= 95 ? 'g' : (projPct >= 80 ? 'y' : 'r');
    const statusColor = status==='g' ? 'var(--verde)' : (status==='y' ? 'var(--laranja)' : 'var(--vermelho)');
    const icon = status==='g' ? '&#9650;' : (status==='r' ? '&#9660;' : '&#9679;');
    const nOnTrack = results.filter(r=>r.metaProd[pk]>0 && (r.realProd[pk]/r.metaProd[pk]*100*factor)>=95).length;
    const nBehind = results.filter(r=>r.metaProd[pk]>0 && (r.realProd[pk]/r.metaProd[pk]*100*factor)<80).length;
    const nTotal = results.filter(r=>r.metaProd[pk]>0).length;

    h += `<div style="padding:10px 0;${pk!=='s10'?'border-top:1px solid var(--line);':''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <b style="font-size:13px">${prodLabels[pk]}</b>
        <span class="rpct ${status}">${nf1(projPct)}%</span>
      </div>
      <div class="rdetail" style="margin-top:4px">
        <span>Real: <b>${nf(Math.round(real))}</b></span>
        <span>Meta: <b>${nf(meta)}</b> m³</span>
        <span>Gap: <b>${nf(Math.round(gap))}</b></span>
      </div>
      <div class="track" style="margin-top:6px">
        <div class="fill" style="width:${Math.min(projPct,120)/1.2}%;background:var(--laranja);opacity:.35"></div>
        <div class="fill" style="width:${Math.min(pct,120)/1.2}%;background:${statusColor}"></div>
        <div class="metaflag" style="left:${100/1.2}%"></div>
      </div>
      <div class="rdetail" style="margin-top:4px;font-size:10.5px">
        <span style="color:var(--verde)">${nOnTrack} no ritmo</span>
        <span style="color:var(--vermelho)">${nBehind} atrasados</span>
        <span>de ${nTotal} vendedores</span>
      </div>
    </div>`;
  }
  h += '</div>';

  // --- 2. SEGMENTO — distribuição consolidada ---
  const allSegs = {};
  for(const r of results){ for(const s of Object.keys(r.segs)) allSegs[s] = (allSegs[s]||0) + r.segs[s]; }
  const segNames = Object.keys(allSegs).sort((a,b)=>allSegs[b]-allSegs[a]);
  const totalSeg = Object.values(allSegs).reduce((a,b)=>a+b,0);

  h += '<div class="card"><h3>Segmento — Distribuição Regional</h3>';
  if(segNames.length === 0){
    h += '<div class="rdetail">Sem dados de segmento</div>';
  } else {
    for(const seg of segNames){
      const vol = allSegs[seg];
      const pct = totalSeg > 0 ? vol/totalSeg*100 : 0;
      const proj = vol * factor;
      h += `<div style="padding:8px 0;${seg!==segNames[0]?'border-top:1px solid var(--line);':''}">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <b style="font-size:13px">${seg}</b>
          <span style="font-size:12px;font-weight:700;color:var(--muted)">${nf1(pct)}%</span>
        </div>
        <div class="rdetail" style="margin-top:2px">
          <span>Real: <b>${nf(Math.round(vol))}</b> m³</span>
          <span>Projeção: <b>${nf(Math.round(proj))}</b> m³</span>
        </div>
        <div class="track" style="margin-top:4px">
          <div class="fill" style="width:${Math.min(pct*1.2,100)}%;background:var(--azul)"></div>
        </div>
      </div>`;
    }
  }
  h += '</div>';

  // --- 3. CLIENTES — visão consolidada ---
  const totalCli = results.reduce((s,r)=>s+r.nCli,0);
  const totalCliMeta = results.reduce((s,r)=>s+r.cliMeta,0);
  const cliPctGeral = totalCliMeta > 0 ? totalCli/totalCliMeta*100 : 0;
  const avgM3Cli = totalCli > 0 ? totalReal/totalCli : 0;
  const nCliOk = results.filter(r=>r.cliMeta>0 && (r.nCli/r.cliMeta*100)>=pctTime*0.9).length;
  const nCliBehind = results.filter(r=>r.cliMeta>0 && (r.nCli/r.cliMeta*100)<pctTime*0.7).length;
  const nCliTotal = results.filter(r=>r.cliMeta>0).length;

  h += '<div class="card"><h3>Clientes — Cobertura do Time</h3>';
  h += `<div style="display:flex;gap:10px;margin-bottom:10px">
    <div style="flex:1;text-align:center;padding:10px;background:#f6f8fa;border-radius:10px">
      <div style="font-size:20px;font-weight:800">${nf(totalCli)}</div>
      <div style="font-size:10.5px;color:var(--muted)">CLIENTES ATIVOS</div>
    </div>
    <div style="flex:1;text-align:center;padding:10px;background:#f6f8fa;border-radius:10px">
      <div style="font-size:20px;font-weight:800">${nf(totalCliMeta)}</div>
      <div style="font-size:10.5px;color:var(--muted)">META BENCHMARK</div>
    </div>
  </div>`;
  const cliStatus = cliPctGeral >= pctTime*0.9 ? 'g' : (cliPctGeral >= pctTime*0.7 ? 'y' : 'r');
  h += `<div class="rdetail"><span>Cobertura geral</span><span class="rpct ${cliStatus}">${nf1(cliPctGeral)}%</span></div>`;
  h += `<div class="track" style="margin-top:6px">
    <div class="fill" style="width:${Math.min(cliPctGeral,120)/1.2}%;background:var(--azul)"></div>
    <div class="metaflag" style="left:${100/1.2}%"></div>
  </div>`;
  h += `<div class="rdetail" style="margin-top:8px">
    <span>m³/cliente médio: <b>${nf1(avgM3Cli)}</b></span>
  </div>`;
  h += `<div class="rdetail" style="margin-top:4px;font-size:10.5px">
    <span style="color:var(--verde)">${nCliOk} no ritmo</span>
    <span style="color:var(--vermelho)">${nCliBehind} abaixo</span>
    <span>de ${nCliTotal} vendedores</span>
  </div>`;
  h += '</div>';

  return h;
}

function compute(txt){
  const {vends, maxDate} = parseCSV(txt);
  if(!maxDate) return null;
  const Y = maxDate.getFullYear(), M = maxDate.getMonth()+1;
  const maxDay = maxDate.getDate();
  const effEl = effDays(Y, M, maxDay);
  const effFull = DIAS_UTEIS;
  const factor = effFull / effEl;
  const restDays = effFull - effEl;

  const result = [];
  const agVol = {s10:0,s500:0,gas:0,hid:0};
  let agCli = 0;

  for(const v of VENDEDORES){
    const csvEntry = Object.entries(vends).find(([name]) => matchVend(name) === v);
    const real = csvEntry ? csvEntry[1] : {vol:{s10:0,s500:0,gas:0,hid:0},segs:{},clientes:new Set(),dias:new Set()};
    const volReal = real.vol.s10 + real.vol.s500 + real.vol.gas + real.vol.hid;
    const proj = volReal * factor;
    const pct = v.total > 0 ? (volReal / v.total * 100) : 0;
    const pctProj = v.total > 0 ? (proj / v.total * 100) : 0;
    const nCli = real.clientes.size;
    const diasAtivos = real.dias.size;
    const ritmo = effEl > 0 ? volReal / effEl : 0;
    const necessario = restDays > 0 ? (v.total - volReal) / restDays : 0;
    const gap = v.total - volReal;
    const benchCli = BENCH_CLI[v.nome] || 0;
    const benchExpected = benchCli > 0 ? Math.round(v.total / benchCli) : v.cli;

    agVol.s10 += real.vol.s10;
    agVol.s500 += real.vol.s500;
    agVol.gas += real.vol.gas;
    agVol.hid += real.vol.hid;
    agCli += nCli;

    result.push({
      nome: v.nome, meta: v.total, metaProd:{s10:v.s10,s500:v.s500,gas:v.gas,hid:v.hid},
      real: volReal, realProd: real.vol, segs: real.segs, proj, pct, pctProj, nCli, diasAtivos,
      ritmo, necessario, gap, obs: v.obs, benchCli, benchExpected, cliMeta: v.cli
    });
  }

  const totalMeta = VENDEDORES.reduce((s,v)=>s+v.total,0);
  const totalReal = result.reduce((s,r)=>s+r.real,0);
  const totalProj = totalReal * factor;

  return {
    results: result, maxDay, Y, M, effEl, effFull, restDays, factor,
    totalMeta, totalReal, totalProj, agVol, agCli
  };
}

function render(){
  if(!DATA){return;}
  const {results, maxDay, M, Y, effEl, effFull, restDays, totalMeta, totalReal, totalProj, agVol, agCli} = DATA;
  const pctTotal = totalMeta > 0 ? totalReal/totalMeta*100 : 0;
  const pctProj = totalMeta > 0 ? totalProj/totalMeta*100 : 0;
  document.getElementById('subref').textContent = `Até ${String(maxDay).padStart(2,'0')}/${String(M).padStart(2,'0')}/${Y} · ${nf1(effEl)} de ${nf1(effFull)} dias úteis`;

  let html = '';
  // KPIs
  html += `<div class="kpis">
    <div class="kpi${pctProj>=95?' ok':pctProj>=80?'':' warn'}">
      <div class="lab">Realizado</div>
      <div class="big">${nf(Math.round(totalReal))}</div>
      <div class="unit">m³ · ${nf1(pctTotal)}% da meta</div>
    </div>
    <div class="kpi${pctProj>=95?' ok':pctProj>=80?'':' warn'}">
      <div class="lab">Projeção</div>
      <div class="big">${nf(Math.round(totalProj))}</div>
      <div class="unit">m³ · ${nf1(pctProj)}%</div>
      <div class="sub">Meta: <b>${nf(totalMeta)}</b> m³</div>
    </div>
    <div class="kpi"><div class="lab">Clientes ativos</div><div class="big">${nf(agCli)}</div><div class="sub">Meta benchmark: <b>1.369</b></div></div>
    <div class="kpi"><div class="lab">Dias restantes</div><div class="big">${nf1(restDays)}</div><div class="sub">de ${nf1(effFull)} úteis</div></div>
  </div>`;

  // Diagnostic: missing EMB or unmatched vendedores
  if(DATA.noEMB){
    html += `<div class="card" style="border-left:4px solid var(--vermelho)">
      <h3 style="color:var(--vermelho)">Base do Copiloto não encontrada</h3>
      <div style="font-size:12px;color:var(--muted);line-height:1.5">
        O Pacing usa o mapeamento cliente→vendedor do <b>Copiloto Comercial SP</b>.<br><br>
        <b>1.</b> Abra o <a href="./index.html" style="color:var(--azul);font-weight:700">Copiloto SP</a> e carregue a base (historico_SP.json)<br>
        <b>2.</b> Depois volte aqui e carregue o YVIEWCOPA novamente
      </div>
    </div>`;
  }

  // Product summary
  const totalMetaP = {s10:41477,s500:13924,gas:13499,hid:1100};
  html += `<div class="card"><h3>Mix de Produtos — Realizado</h3><div class="prod-grid">
    <div class="prod-item"><div class="pv">${nf(Math.round(agVol.s10))}</div><div class="pl">S10</div><div class="pl">${nf1(agVol.s10/totalMetaP.s10*100)}%</div></div>
    <div class="prod-item"><div class="pv">${nf(Math.round(agVol.s500))}</div><div class="pl">S500</div><div class="pl">${nf1(agVol.s500/totalMetaP.s500*100)}%</div></div>
    <div class="prod-item"><div class="pv">${nf(Math.round(agVol.gas))}</div><div class="pl">Gasolina</div><div class="pl">${nf1(agVol.gas/totalMetaP.gas*100)}%</div></div>
    <div class="prod-item"><div class="pv">${nf(Math.round(agVol.hid))}</div><div class="pl">Hidratado</div><div class="pl">${nf1(agVol.hid/totalMetaP.hid*100)}%</div></div>
  </div></div>`;

  // Tabs
  html += `<div class="tabs">
    <div class="tab${TAB==='volume'?' on':''}" data-tab="volume">Volume</div>
    <div class="tab${TAB==='clientes'?' on':''}" data-tab="clientes">Clientes</div>
    <div class="tab${TAB==='produtos'?' on':''}" data-tab="produtos">Produtos</div>
    <div class="tab${TAB==='analise'?' on':''}" data-tab="analise">Análise</div>
  </div>`;

  if(TAB === 'analise'){
    html += renderAnalise(results, DATA);
  } else {
    // Sort
    let sorted = [...results];
    if(TAB==='volume') sorted.sort((a,b)=>b.pct-a.pct);
    else if(TAB==='clientes') sorted.sort((a,b)=>b.nCli-a.nCli);
    else sorted.sort((a,b)=>b.real-a.real);

    html += `<div class="legend">
      <span><span class="dot" style="background:var(--azul)"></span>Realizado</span>
      <span><span class="dot" style="background:var(--laranja)"></span>Projeção</span>
      <span>│ = Meta</span>
    </div>`;

    html += '<div class="rows">';
    for(const r of sorted){
      const pctCls = r.pctProj >= 95 ? 'g' : (r.pctProj >= 75 ? 'y' : 'r');
      const fillW = Math.min(r.pct, 120);
      const projW = Math.min(r.pctProj, 120);
      const metaPos = Math.min(100, 100);

      if(TAB === 'volume'){
        html += `<div class="row">
          <div class="rhead"><span class="rname">${r.nome}</span><span class="rpct ${pctCls}">${nf1(r.pct)}%</span></div>
          <div class="rdetail">
            <span><b>${nf(Math.round(r.real))}</b> de ${nf(r.meta)} m³</span>
            <span>Proj: <b>${nf(Math.round(r.proj))}</b></span>
            <span>Gap: <b>${nf(Math.round(r.gap))}</b></span>
          </div>
          <div class="track">
            <div class="fill" style="width:${projW/1.2}%;background:var(--laranja);opacity:.35"></div>
            <div class="fill" style="width:${fillW/1.2}%;background:var(--azul)"></div>
            <div class="metaflag" style="left:${metaPos/1.2}%"></div>
          </div>
          <div class="rdetail" style="margin-top:4px">
            <span>Ritmo: <b>${nf1(r.ritmo)}</b> m³/dia</span>
            <span>Necessário: <b>${nf1(r.necessario)}</b> m³/dia</span>
          </div>
          ${r.obs ? '<div class="obs">'+r.obs+'</div>' : ''}
        </div>`;
      } else if(TAB === 'clientes'){
        const cliPct = r.cliMeta > 0 ? (r.nCli/r.cliMeta*100) : 0;
        const cliCls = cliPct >= 90 ? 'g' : (cliPct >= 70 ? 'y' : 'r');
        html += `<div class="row">
          <div class="rhead"><span class="rname">${r.nome}</span><span class="rpct ${cliCls}">${r.nCli} / ${r.cliMeta}</span></div>
          <div class="rdetail">
            <span>Clientes ativos: <b>${r.nCli}</b></span>
            <span>Meta: <b>${r.cliMeta}</b></span>
            <span>Cobertura: <b>${nf1(cliPct)}%</b></span>
          </div>
          <div class="track">
            <div class="fill" style="width:${Math.min(cliPct,120)/1.2}%;background:var(--azul)"></div>
            <div class="metaflag" style="left:${100/1.2}%"></div>
          </div>
          ${r.benchCli ? '<div class="rdetail" style="margin-top:4px"><span>Benchmark: <b>'+nf1(r.benchCli)+'</b> m³/cliente</span><span>Real: <b>'+nf1(r.nCli>0?r.real/r.nCli:0)+'</b> m³/cli</span></div>' : ''}
        </div>`;
      } else if(TAB === 'produtos') {
        const prods = [
          {k:'s10',l:'S10',meta:r.metaProd.s10,real:r.realProd.s10},
          {k:'s500',l:'S500',meta:r.metaProd.s500,real:r.realProd.s500},
          {k:'gas',l:'Gasolina',meta:r.metaProd.gas,real:r.realProd.gas},
          {k:'hid',l:'Hidratado',meta:r.metaProd.hid,real:r.realProd.hid}
        ];
        html += `<div class="row"><div class="rhead"><span class="rname">${r.nome}</span><span class="rpct ${pctCls}">${nf1(r.pct)}%</span></div>`;
        for(const p of prods){
          if(p.meta <= 0) continue;
          const pp = p.meta > 0 ? p.real/p.meta*100 : 0;
          const pc = pp >= 80 ? 'var(--verde)' : (pp >= 50 ? 'var(--laranja)' : 'var(--vermelho)');
          html += `<div class="rdetail" style="margin-top:4px"><span>${p.l}: <b>${nf(Math.round(p.real))}</b> / ${nf(p.meta)}</span><span style="color:${pc};font-weight:700">${nf1(pp)}%</span></div>`;
        }
        html += '</div>';
      }
    }
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;

  // Tab events
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', ()=>{
    TAB = t.dataset.tab; render();
  }));
}

/* ===== File loading ===== */
document.getElementById('btnUp').addEventListener('click', ()=> document.getElementById('fileIn').click());
document.getElementById('fileIn').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  flash('Processando…');
  const r = new FileReader();
  r.onload = async () => {
    try {
      if(!EMB_HIST) await loadEMB();
      const txt = r.result;
      const {vends} = parseCSV(txt);
      const csvNames = Object.keys(vends);
      const unmatched = csvNames.filter(n=>!matchVend(n));
      const unmatchedVol = unmatched.reduce((s,n)=>{const e=vends[n];return s+e.vol.s10+e.vol.s500+e.vol.gas+e.vol.hid;},0);
      DATA = compute(txt);
      if(!DATA || !DATA.results.length){flash('Sem dados SP no arquivo.');return;}
      DATA.unmatched = unmatched.map(n=>{const e=vends[n];return{nome:n,vol:Math.round(e.vol.s10+e.vol.s500+e.vol.gas+e.vol.hid),cli:e.clientes.size};}).sort((a,b)=>b.vol-a.vol);
      DATA.unmatchedVol = unmatchedVol;
      DATA.noEMB = !EMB_HIST;
      const matched = DATA.results.filter(r=>r.real>0).length;
      render();
      if(!EMB_HIST) flash('Sem base do Copiloto — abra o Copiloto SP primeiro');
      else flash(matched+' vendedores · até '+DATA.maxDay+'/'+String(DATA.M).padStart(2,'0')+'/'+DATA.Y);
    } catch(err){flash('Erro: '+err.message);console.error(err);}
  };
  r.readAsText(f, 'iso-8859-1');
  e.target.value = '';
});

let ft;
function flash(m){const el=document.getElementById('flash');el.textContent=m;el.classList.add('on');clearTimeout(ft);ft=setTimeout(()=>el.classList.remove('on'),3000);}

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}

(async function boot(){
  const ok = await loadEMB();
  const msg = document.getElementById('emptyMsg');
  if(!msg) return;
  if(ok){
    msg.innerHTML = 'Base do Copiloto carregada (' + Object.keys(EMB_HIST).length + ' clientes mapeados).<br>Toque em <b>⟳ Atualizar</b> e selecione o YVIEWCOPA.';
  } else {
    msg.innerHTML = '<b style="color:var(--vermelho)">Base do Copiloto não encontrada.</b><br><br>'
      + '1. Abra o <a href="./index.html" style="color:var(--azul);font-weight:700">Copiloto SP</a> e carregue a base<br>'
      + '2. Volte aqui e carregue o YVIEWCOPA';
  }
})();
</script>
